<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Topolino</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="radio-container">
        <header>
            <h1>Radio Topolino</h1>
            <p id="current-date"></p>
        </header>

        <div class="player-card">
            <div class="cover-art">
                <div class="pulse"></div>
                <span class="upload-hint">📻</span>
            </div>

            <div class="info">
                <h2 id="track-title">Sintonizzazione...</h2>
                <p id="artist-name">In Diretta H24</p>
            </div>

            <audio id="audio-player"></audio>
        </div>

        <section class="user-area">
            <input type="text" id="user-name" placeholder="Il tuo nome">
            <button id="save-local">Salva</button>
        </section>
        
        <p style="font-size: 0.8em; color: #666; margin-top: 10px;">
            Nota: La musica è sincronizzata per tutti gli ascoltatori.
        </p>
    </div>

    <script src="script.js"></script>
</body>
</html>
